name: AI Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | head -20)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -500)
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security check summary
        run: |
          echo "## AI Review Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changed files" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changed.outputs.files }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for common security issues in diff
          ISSUES=0

          # API keys / secrets in code
          if echo "${{ steps.diff.outputs.diff }}" | grep -iE "api[_-]?key|secret|password|token" | grep -vE "\.env|secrets\.|GITHUB_TOKEN|HF_TOKEN|\.yml|\.yaml|test_|# |label|placeholder|type.*password" | head -5 > /tmp/security_hits; then
            if [ -s /tmp/security_hits ]; then
              echo "### ⚠️ Potential secrets in code" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat /tmp/security_hits >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              ISSUES=$((ISSUES+1))
            fi
          fi

          # eval / exec usage
          if echo "${{ steps.diff.outputs.diff }}" | grep -E "^\+.*\b(eval|exec)\b" | grep -v "test_" | head -5 > /tmp/eval_hits; then
            if [ -s /tmp/eval_hits ]; then
              echo "### ⚠️ eval/exec usage detected" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat /tmp/eval_hits >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              ISSUES=$((ISSUES+1))
            fi
          fi

          # subprocess / os.system
          if echo "${{ steps.diff.outputs.diff }}" | grep -E "^\+.*\b(subprocess|os\.system|os\.popen)\b" | head -5 > /tmp/subprocess_hits; then
            if [ -s /tmp/subprocess_hits ]; then
              echo "### ⚠️ subprocess/os.system usage" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat /tmp/subprocess_hits >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              ISSUES=$((ISSUES+1))
            fi
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "### ✅ No security concerns found" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "*Automated security + quality review*" >> "$GITHUB_STEP_SUMMARY"
